<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PriceScout - Profile</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="profile">
    <header class="app-nav">
      <a class="brand-mark" href="index.html"><strong>PriceScout</strong></a>
      <nav aria-label="Primary">
        <a class="nav-btn" href="index.html">Scan</a>
        <a class="nav-btn" href="list.html">List</a>
        <a class="nav-btn" href="history.html">History</a>
        <a class="nav-btn" href="saved.html">Saved</a>
        <a class="nav-btn active" href="profile.html">Profile</a>
      </nav>
      <a id="profileButton" class="profile-pill active" href="profile.html"><span id="profileName">My profile</span></a>
    </header>

    <main class="app-page">
      <header class="page-heading">
        <div>
          <p class="eyebrow">Profile</p>
          <h1>Local profile</h1>
        </div>
      </header>
      <form id="profileForm" class="profile-form" autocomplete="off">
        <label for="profileNameInput">Profile name</label>
        <div class="lookup-row">
          <input id="profileNameInput" type="text" placeholder="My profile" />
          <button type="submit">Save</button>
        </div>
      </form>
      <div id="profileStats" class="profile-stats"></div>
    </main>

    <nav class="bottom-nav" aria-label="Primary mobile">
      <a class="nav-btn" href="index.html">Scan</a>
      <a class="nav-btn" href="list.html">List</a>
      <a class="nav-btn" href="history.html">History</a>
      <a class="nav-btn" href="saved.html">Saved</a>
      <a class="nav-btn active" href="profile.html">Profile</a>
    </nav>
    <script src="pages.js"></script>
  </body>
</html>
